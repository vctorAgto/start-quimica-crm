  .phone-content{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px 10px;}

  .m-card{background:#fff; border:1px solid var(--gray-200); border-radius:14px; padding:14px 15px; margin-bottom:12px; box-shadow:var(--shadow);}
  .m-hello{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .m-hello .av{width:38px;height:38px;border-radius:10px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
  .m-hello h2{margin:0; font-size:16px;}
  .m-hello span{font-size:12px; color:var(--gray-600);}
  .m-hello .sparkle{margin-left:auto; width:34px;height:34px;border-radius:10px;background:var(--cyan-light); color:var(--cyan-dark); display:flex;align-items:center;justify-content:center; font-size:15px;}
  .m-seg{display:flex; background:#fff; border:1px solid var(--gray-200); border-radius:10px; padding:3px; margin-bottom:12px;}
  .m-seg button{flex:1; border:0; background:transparent; padding:8px; border-radius:8px; font-size:12.5px; font-weight:700; color:var(--gray-600);}
  .m-seg button.active{background:var(--navy); color:#fff;}
  .m-goal{background:linear-gradient(135deg,var(--navy),#123049); color:#fff; border-radius:14px; padding:14px 16px; margin-bottom:12px;}
  .m-goal .bar-wrap{height:7px; background:rgba(255,255,255,.2); border-radius:6px; margin-top:8px; overflow:hidden;}
  .m-goal .bar{height:100%; background:#fff; border-radius:6px;}
  .m-stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;}
  .m-stat{background:#fff; border:1px solid var(--gray-200); border-radius:12px; padding:10px 12px;}
  .m-stat .n{font-size:19px; font-weight:800;}
  .m-stat .l{font-size:11px; color:var(--gray-600);}
  .m-stat.risk .n{color:var(--red);}
  .m-cta{background:var(--cyan-light); border:1px solid #b9eef2; border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:12.5px; color:var(--cyan-dark); font-weight:700; display:flex; align-items:center; justify-content:space-between;}
  .m-visit{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--gray-100);}
  .m-visit:last-child{border-bottom:0;}
  .m-visit .t{font-weight:800; font-size:13px; width:44px;}
  .m-visit .n{flex:1; font-size:13px; font-weight:700;}
  .m-visit .n small{display:block; font-weight:500; color:var(--gray-600); font-size:11px;}
  .m-tagline{font-size:10.5px; font-weight:800; text-transform:uppercase; letter-spacing:.4px;}
  .foc-item{border-left:4px solid var(--blue); background:#fff; border-radius:10px; padding:12px 14px; margin-bottom:10px; box-shadow:var(--shadow);}
  .foc-item.crit{border-left-color:var(--red);}
  .foc-item.opp{border-left-color:var(--green);}
  .foc-item.cross{border-left-color:var(--cyan);}
  .foc-item.visit{border-left-color:var(--amber);}
  .foc-item .tag{font-size:10px; font-weight:800; text-transform:uppercase; color:var(--gray-600); margin-bottom:3px;}
  .foc-item h4{margin:0 0 8px; font-size:13.5px; line-height:1.4;}
  .foc-item a.action{font-size:12.5px; font-weight:800; color:var(--blue);}

  .m-filters{display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; margin-bottom:2px;}
  .m-filters .chip{white-space:nowrap;}
  .chip{display:inline-flex; align-items:center; padding:6px 13px; border-radius:999px; border:1px solid var(--gray-300); font-size:12.5px; font-weight:600; color:var(--gray-600); background:#fff;}
  .chip.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .client-card{display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--gray-200); border-radius:12px; padding:11px 13px; margin-bottom:10px; box-shadow:var(--shadow);}
  .client-card .score{width:38px;height:38px;border-radius:50%; border:2px solid var(--green); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:var(--green); flex-shrink:0;}

  .client-card .info span{font-size:11px; color:var(--gray-600);}
  .client-card .metrics{text-align:right; font-size:11px; color:var(--gray-600); flex-shrink:0;}
  .client-card .metrics b{display:block; font-size:13px; color:var(--gray-900);}

  .c360-head .row{display:flex; align-items:center; gap:12px;}
  .c360-head .score{width:46px;height:46px;border-radius:50%; border:3px solid var(--green); display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:800; font-size:14px; color:var(--green); flex-shrink:0;}

  .ia-box b{display:block; color:var(--cyan-dark); margin-bottom:4px; font-size:12.5px;}

  .timeline-group{margin-bottom:16px;}
  .timeline-group h5{font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--gray-600); margin:0 0 8px;}
  .t-item{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--gray-100);}

  .t-item .body b{font-size:12.5px; display:block;}
  .t-item .body span{font-size:11.5px; color:var(--gray-600);}
  .t-item .time{font-size:11px; color:var(--gray-400); white-space:nowrap;}

  .route-box{background:var(--navy); border-radius:12px; height:110px; position:relative; margin-bottom:12px; overflow:hidden;}
  .route-box .badge2{position:absolute; bottom:8px; left:10px; background:rgba(255,255,255,.15); color:#fff; font-size:11px; padding:4px 9px; border-radius:8px;}

  .agenda-stop .info b{display:block; font-size:13px;}
  .agenda-stop .info span{font-size:11px; color:var(--gray-600);}

  .step-dots{display:flex; gap:5px; margin-bottom:16px;}
  .step-dots i{flex:1; height:4px; border-radius:4px; background:var(--gray-200);}
  .step-dots i.on{background:var(--blue);}
  .radio-row{display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--gray-200); border-radius:12px; padding:14px 16px; margin-bottom:10px; font-size:13.5px; font-weight:600;}
  .radio-row.sel{border-color:var(--blue); background:var(--blue-light);}
  .radio-dot{width:18px;height:18px;border-radius:50%; border:2px solid var(--gray-300);}
  .radio-row.sel .radio-dot{border-color:var(--blue); background:var(--blue); box-shadow:inset 0 0 0 3px #fff;}

  .react-card{background:#fff; border:1px solid var(--gray-200); border-radius:14px; padding:14px 15px; margin-bottom:12px; box-shadow:var(--shadow);}

  .react-card h4{margin:0 0 2px; font-size:14px;}
  .react-card .seg{font-size:11.5px; color:var(--gray-600);}

  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  /* ---------- click affordance ---------- */
  [data-go], [data-action]{cursor:pointer;}
  .btn,.chip,.pill,.m-seg button,.m-tabs button,.qty-btn,.wiz-chip{transition:transform .08s ease;}
  .btn:active,.chip:active,.pill:active,.m-seg button:active,.m-tabs button:active,.qty-btn:active,.wiz-chip:active{transform:scale(.94);}
  .m-card[data-go],.client-card,.risk-card,.react-card,.agenda-stop{transition:transform .1s ease, box-shadow .15s ease;}
  .m-card[data-go]:active,.client-card:active,.risk-card:active,.react-card:active,.agenda-stop:active{transform:scale(.98);}
  .is-done{opacity:.55;}
  .done-badge{background:var(--green-light); color:var(--green); font-weight:800; font-size:11.5px; padding:6px 12px; border-radius:8px; display:inline-flex; align-items:center; gap:4px; white-space:nowrap;}

  /* ---------- login ---------- */
  .login-page{flex:1; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(1200px 500px at 10% -10%, #14304f 0%, var(--navy) 45%, #081420 100%); padding:20px;}
  .login-card{width:360px; max-width:100%; background:#fff; border-radius:18px; padding:34px 30px; box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .login-logo{font-size:15px; font-weight:800; margin-bottom:18px;}
  .login-card h2{margin:0 0 4px; font-size:20px;}
  .login-err{background:var(--red-light); color:var(--red); font-size:12.5px; font-weight:700; padding:9px 12px; border-radius:9px; margin-bottom:12px;}
  .login-hint{text-align:center; font-size:12px; color:var(--gray-600); margin:16px 0 0;}
  @keyframes shake{10%,90%{transform:translateX(-1px);}20%,80%{transform:translateX(2px);}30%,50%,70%{transform:translateX(-4px);}40%,60%{transform:translateX(4px);}}
  .shake{animation:shake .4s;}

  /* ---------- activity feed ---------- */
  .activity-feed{margin-top:18px; background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow);}
  .activity-feed h4{margin:0 0 8px; font-size:13px;}
  .activity-item{display:flex; gap:8px; font-size:12.5px; color:var(--gray-600); padding:6px 0; border-bottom:1px solid var(--gray-100);}
  .activity-item:last-child{border-bottom:0;}
  .activity-item .dot{width:6px;height:6px;border-radius:50%; background:var(--cyan); margin-top:5px; flex-shrink:0;}

  /* ---------- visita wizard ---------- */
  .wiz-chip-grid{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
  .wiz-chip{padding:9px 14px; border-radius:10px; border:1px solid var(--gray-300); font-size:13px; font-weight:600; background:#fff;}
  .wiz-chip.sel{background:var(--blue); color:#fff; border-color:var(--blue);}
  .qty-row{display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--gray-200); border-radius:10px; padding:10px 12px; margin-bottom:8px;}
  .qty-controls{display:flex; align-items:center; gap:10px;}
  .qty-btn{width:26px;height:26px;border-radius:8px; border:1px solid var(--gray-300); background:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .photo-slot{width:56px;height:56px;border-radius:10px; border:2px dashed var(--gray-300); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--gray-400);}
  .wiz-summary-row{display:flex; justify-content:space-between; font-size:13px; padding:8px 0; border-bottom:1px solid var(--gray-100);}
  textarea{width:100%; border:1px solid var(--gray-300); border-radius:9px; padding:10px 12px; font-size:13.5px; font-family:inherit; resize:vertical; min-height:80px;}
</style>

/* ============================= AUTH & APP STATE ============================= */
function loadJSON(key, fallback){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch(e){ return fallback; }
}
function saveJSON(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

const AUTH = loadJSON('sq_app_auth', {loggedIn:false, user:null});
const APP = loadJSON('sq_app_state', {doneFoco:[], doneReact:[], doneRisk:[], visits:{}, activities:[], leads:[]});
function saveApp(){ saveJSON('sq_app_state', APP); }
function nowHM(){ return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function logActivity(msg){
  APP.activities.unshift({msg, time:nowHM()});
  APP.activities = APP.activities.slice(0,8);
  saveApp();
}

/* ============================= STATE ============================= */
const S = { mscreen:'home', mhome:'cartoes', mfilter:'Todos', mseg:null, clientId:'santaclara', c360tab:'briefing', c360sub:'Resumo',
  leadSeg:null, wiz:{step:0, objetivo:null, produtos:[], qtd:{}, obs:'', fotos:0} };

function go(patch){
  if(patch.mscreen==='visita' && S.mscreen!=='visita'){
    patch = Object.assign({}, patch, {wiz:{step:0, objetivo:null, produtos:[], qtd:{}, obs:'', fotos:0}});
  }
  Object.assign(S, patch); render();
  const c = document.querySelector('.phone-content'); if(c) c.scrollTop = 0;
}
function toast(msg){
  const t = document.getElementById('toast');
  t.innerHTML = '✓ '+msg; t.classList.add('show');
  clearTimeout(window.__toastT); window.__toastT = setTimeout(()=>t.classList.remove('show'), 2200);
}

function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if(u.toLowerCase()==='admin' && p==='admin'){
    AUTH.loggedIn = true; AUTH.user = 'admin'; saveJSON('sq_app_auth', AUTH);
    render();
  } else {
    const card = document.getElementById('loginCard');
    document.getElementById('loginError').style.display = 'block';
    card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
  }
}
function doLogout(){
  AUTH.loggedIn = false; AUTH.user = null; saveJSON('sq_app_auth', AUTH);
  render();
}
function markFocoDone(el){
  const id = el.getAttribute('data-id'); const label = el.getAttribute('data-label');
  if(!APP.doneFoco.includes(id)){ APP.doneFoco.push(id); saveApp(); logActivity(`Resolvido: "${label}"`); }
  toast('Marcado como resolvido');
  render();
}
function markReactDone(el){
  const id = el.getAttribute('data-id'); const name = el.getAttribute('data-label');
  if(!APP.doneReact.includes(id)){ APP.doneReact.push(id); saveApp(); logActivity(`Visita de reativação planejada para ${name}`); }
  toast(`Visita planejada para ${name}`);
  render();
}
function markRiskDone(el){
  const id = el.getAttribute('data-id'); const name = el.getAttribute('data-label');
  if(!APP.doneRisk.includes(id)){ APP.doneRisk.push(id); saveApp(); logActivity(`Ação registrada para conta em risco: ${name}`); }
  toast(`Ação registrada para ${name}`);
  render();
}
function saveLead(){
  const empresa = document.getElementById('leadEmpresa').value.trim();
  const nome = document.getElementById('leadNome').value.trim();
  if(!empresa){ toast('Informe ao menos o nome da empresa'); return; }
  APP.leads.unshift({nome:nome||'(sem contato)', empresa, segmento:S.leadSeg, hora:nowHM()});
  saveApp(); logActivity(`Lead qualificado: ${empresa}`);
  S.leadSeg = null;
  toast('Lead qualificado com sucesso!');
  render();
}

function wizNext(){ if(S.wiz.step<7){ S.wiz.step++; render(); } }
function wizBack(){ if(S.wiz.step>0){ S.wiz.step--; render(); } else { go({mscreen:'agenda'}); } }
function wizToggleProd(val){
  const i = S.wiz.produtos.indexOf(val);
  if(i>=0){ S.wiz.produtos.splice(i,1); delete S.wiz.qtd[val]; }
  else { S.wiz.produtos.push(val); S.wiz.qtd[val] = 1; }
  render();
}
function wizQty(val, delta){
  const cur = S.wiz.qtd[val]||0;
  S.wiz.qtd[val] = Math.max(0, cur+delta);
  render();
}
function wizPhoto(){ S.wiz.fotos = Math.min(6, S.wiz.fotos+1); render(); }
function wizFinish(){
  const c = byId(S.clientId);
  APP.visits[c.id] = 'done';
  const totalItens = Object.values(S.wiz.qtd).reduce((a,b)=>a+b,0);
  saveApp();
  logActivity(`Visita concluída em ${c.name}${totalItens? ' · pedido com '+totalItens+' itens':''}`);
  if(!c.timeline['Hoje']) c.timeline['Hoje'] = [];
  c.timeline['Hoje'].unshift({ic:'◉', titulo:'Visita concluída', desc: totalItens? `Pedido registrado em campo · ${totalItens} itens` : 'Check-in e briefing realizados', hora: nowHM()});
  toast('Visita concluída com sucesso!');
  go({mscreen:'agenda'});
}

const TABS = [
  {id:'home', ic:'⌂', label:'Início'},
  {id:'carteira', ic:'▤', label:'Carteira'},
  {id:'agenda', ic:'▦', label:'Agenda'},
  {id:'azulia', ic:'✦', label:'AzulIA'},
  {id:'risco', ic:'◉', label:'Risco'},
];

function renderMobile(){
  return `<div class="phone-page">
    <div class="phone-frame">
      <div class="phone-content">${mobileScreen()}</div>
      <div class="phone-tabbar">
        ${TABS.map(t=>`<a class="${S.mscreen===t.id?'active':''}" data-go='{"mscreen":"${t.id}"}'><span class="ic">${t.ic}</span>${t.label}</a>`).join('')}
      </div>
    </div>
  </div>`;
}

function mobileScreen(){
  if(S.mscreen==='home') return mHome();
  if(S.mscreen==='carteira') return mCarteira();
  if(S.mscreen==='agenda') return mAgenda();
  if(S.mscreen==='azulia') return mAzulIA();
  if(S.mscreen==='risco') return mRisco();
  if(S.mscreen==='c360') return mCliente360();
  if(S.mscreen==='timeline') return mTimeline();
  if(S.mscreen==='visita') return mVisita();
  if(S.mscreen==='novolead') return mNovoLead();
  if(S.mscreen==='reativacao') return mReativacao();
  return '';
}

function mHello(){
  return `<div class="m-hello">
    <div class="av">CE</div>
    <div><h2>Bom dia, Carlos</h2><span>Seg, 29 jun · 12 visitas hoje</span></div>
    <div class="sparkle">✦</div>
  </div>`;
}

const WIZ_LABELS = ['Check-in','Cliente','Objetivo','Produtos','Pedido','Observações','Fotos','Resumo'];
const WIZ_OBJETIVOS = ['Apresentar lançamento','Renovação de contrato','Cross-sell de mix','Cobrança / financeiro'];
const WIZ_PRODUTOS = ['Asseptgel Pro','Linha Azulim Concentrado','Adjuvante Aderix','Vernissage','Oral Care Remin'];

  const c = byId(S.clientId) || byId('santaclara');

function wizStepBody(c, step){
  if(step===0){
    return `<div class="m-card" style="text-align:center;padding:26px 14px;">
      <div style="font-size:30px;margin-bottom:10px;">📍</div>
      <p style="font-weight:700;margin:0 0 4px;">Check-in no local</p>
      <p class="muted" style="font-size:12.5px;margin:0;">GPS confirmado · ${c.cidade}</p>
    </div>`;
  }
  if(step===1){
    return `<div class="client-card"><div class="score">${c.score}</div><div class="info"><b>${c.name}</b><span>${c.segment} · ${c.cidade}</span></div><div class="metrics"><b>${c.fat}</b>Cliente ${c.badge}</div></div>
    <div class="ia-box"><b>✦ Briefing rápido</b>${c.briefing}</div>`;
  }
  if(step===2){
    return WIZ_OBJETIVOS.map((o,i)=>`<div class="radio-row ${S.wiz.objetivo===i?'sel':''}" data-action="wiz-obj" data-val="${i}">${o}<span class="radio-dot"></span></div>`).join('');
  }
  if(step===3){
    return `<p class="muted" style="font-size:12.5px;margin:0 0 10px;">Selecione os produtos apresentados na visita.</p>
    <div class="wiz-chip-grid">${WIZ_PRODUTOS.map(p=>`<span class="wiz-chip ${S.wiz.produtos.includes(p)?'sel':''}" data-action="wiz-toggle-prod" data-val="${p}">${p}</span>`).join('')}</div>`;
  }
  if(step===4){
    if(!S.wiz.produtos.length) return `<div class="m-card" style="text-align:center;color:var(--gray-600);padding:16px;">Volte ao passo anterior e selecione produtos.</div>`;
    let total = 0;
    const rows = S.wiz.produtos.map(p=>{
      const q = S.wiz.qtd[p]||0; total += q;
      return `<div class="qty-row"><span style="font-size:13px;font-weight:600;">${p}</span>
        <div class="qty-controls"><button class="qty-btn" data-action="wiz-qty" data-val="${p}" data-delta="-1">−</button><b>${q}</b><button class="qty-btn" data-action="wiz-qty" data-val="${p}" data-delta="1">+</button></div></div>`;
    }).join('');
    return rows + `<div style="text-align:right;margin-top:10px;font-size:13px;font-weight:800;">Total de itens no pedido: ${total}</div>`;
  }
  if(step===5){
    return `<div class="field"><label>Observações da visita</label><textarea id="wizObs" placeholder="Ex.: cliente pediu prazo maior para pagamento...">${S.wiz.obs||''}</textarea></div>`;
  }
  if(step===6){
    return `<p class="muted" style="font-size:12.5px;margin:0 0 10px;">Anexe fotos da visita (loja, gôndola, prova de entrega).</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      ${Array.from({length:S.wiz.fotos}).map(()=>`<div class="photo-slot">📷</div>`).join('')}
      <div class="photo-slot" data-action="wiz-photo">+</div>
    </div>
    <p class="muted" style="font-size:11.5px;margin-top:10px;">${S.wiz.fotos} foto(s) anexada(s)</p>`;
  }
  if(step===7){
    return `<div class="m-card">
      <div class="wiz-summary-row"><span class="muted">Objetivo</span><b>${S.wiz.objetivo!=null?WIZ_OBJETIVOS[S.wiz.objetivo]:'-'}</b></div>
      <div class="wiz-summary-row"><span class="muted">Produtos apresentados</span><b>${S.wiz.produtos.length||0}</b></div>
      <div class="wiz-summary-row"><span class="muted">Itens no pedido</span><b>${Object.values(S.wiz.qtd).reduce((a,b)=>a+b,0)}</b></div>
      <div class="wiz-summary-row"><span class="muted">Fotos anexadas</span><b>${S.wiz.fotos}</b></div>
      <div class="wiz-summary-row" style="border-bottom:0;"><span class="muted">Observações</span><b style="text-align:right;max-width:60%;">${S.wiz.obs||'-'}</b></div>
    </div>`;
  }
  return '';
}

/* ============================= EVENTS ============================= */
document.addEventListener('click', (e)=>{
  const goEl = e.target.closest('[data-go]');
  if(goEl){ go(JSON.parse(goEl.getAttribute('data-go'))); return; }
  const actionEl = e.target.closest('[data-action]');
  if(actionEl){
    const action = actionEl.getAttribute('data-action');
    if(action==='login') return doLogin();
    if(action==='logout') return doLogout();
    if(action==='mark-foco') return markFocoDone(actionEl);
    if(action==='mark-react') return markReactDone(actionEl);
    if(action==='mark-risk') return markRiskDone(actionEl);
    if(action==='save-lead') return saveLead();
    if(action==='toggle-lead-seg'){ S.leadSeg = (S.leadSeg===actionEl.getAttribute('data-val')) ? null : actionEl.getAttribute('data-val'); render(); return; }
    if(action==='wiz-next') return wizNext();
    if(action==='wiz-back') return wizBack();
    if(action==='wiz-finish') return wizFinish();
    if(action==='wiz-obj'){ S.wiz.objetivo = parseInt(actionEl.getAttribute('data-val')); render(); return; }
    if(action==='wiz-toggle-prod') return wizToggleProd(actionEl.getAttribute('data-val'));
    if(action==='wiz-qty') return wizQty(actionEl.getAttribute('data-val'), parseInt(actionEl.getAttribute('data-delta')));
    if(action==='wiz-photo') return wizPhoto();
    return;
  }
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !AUTH.loggedIn && (e.target.id==='loginUser'||e.target.id==='loginPass')) doLogin();
});
document.addEventListener('input', (e)=>{
  if(e.target.id==='wizObs'){ S.wiz.obs = e.target.value; }
});

render();
</script>
</html>
